services:
  mysql:
    profiles:
      - local-mysql
    image: mysql:8.0
    container_name: uniinfo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: tree_education_uniinfo
      MYSQL_USER: tree_user
      MYSQL_PASSWORD: tree_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-utree_user", "-ptree_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uniinfo-scraper
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: python -m src.main --help

volumes:
  mysql_data:
